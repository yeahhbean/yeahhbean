<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="200" viewBox="0 0 1000 200" role="img" aria-label="LEE YEBIN — Vulnerability Research, Web Exploit, LLM Security">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="55%" stop-color="#171341"/>
      <stop offset="100%" stop-color="#241a5c"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#312E81"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0"/>
      <stop offset="50%" stop-color="#A78BFA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="1000" height="200" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#6366F1" stroke-opacity="0.10">
    <path d="M0 40H1000M0 80H1000M0 120H1000M0 160H1000"/>
    <path d="M100 0V200M200 0V200M300 0V200M400 0V200M500 0V200M600 0V200M700 0V200M800 0V200M900 0V200"/>
  </g>

  <!-- glow -->
  <ellipse cx="500" cy="120" rx="300" ry="60" fill="#6366F1" opacity="0.25" filter="url(#soft)"/>

  <!-- waves -->
  <g opacity="0.55">
    <path fill="url(#wave2)" d="M0,150 C150,120 250,180 400,155 C560,128 660,178 800,152 C880,138 950,150 1000,158 L1000,200 L0,200 Z">
      <animate attributeName="d" dur="9s" repeatCount="indefinite"
        values="M0,150 C150,120 250,180 400,155 C560,128 660,178 800,152 C880,138 950,150 1000,158 L1000,200 L0,200 Z;
                M0,158 C150,178 250,128 400,150 C560,172 660,124 800,158 C880,172 950,158 1000,148 L1000,200 L0,200 Z;
                M0,150 C150,120 250,180 400,155 C560,128 660,178 800,152 C880,138 950,150 1000,158 L1000,200 L0,200 Z"/>
    </path>
  </g>
  <g opacity="0.9">
    <path fill="url(#wave1)" d="M0,170 C140,150 260,192 400,172 C560,150 680,192 820,170 C900,158 960,168 1000,174 L1000,200 L0,200 Z">
      <animate attributeName="d" dur="7s" repeatCount="indefinite"
        values="M0,170 C140,150 260,192 400,172 C560,150 680,192 820,170 C900,158 960,168 1000,174 L1000,200 L0,200 Z;
                M0,176 C140,192 260,152 400,176 C560,196 680,152 820,178 C900,190 960,176 1000,166 L1000,200 L0,200 Z;
                M0,170 C140,150 260,192 400,172 C560,150 680,192 820,170 C900,158 960,168 1000,174 L1000,200 L0,200 Z"/>
    </path>
  </g>

  <!-- title -->
  <g font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" text-anchor="middle">
    <text x="500" y="88" font-size="52" font-weight="700" fill="#EEF2FF" letter-spacing="8">
      LEE YEBIN
      <animate attributeName="opacity" from="0" to="1" dur="1.1s" fill="freeze"/>
    </text>
    <rect x="360" y="102" width="280" height="1.5" fill="url(#rule)">
      <animate attributeName="opacity" values="0;1" dur="1.4s" fill="freeze"/>
    </rect>
    <text x="500" y="128" font-size="15" font-weight="500" fill="#C7D2FE" letter-spacing="3">
      Vulnerability Research · Web Exploit · LLM Security
      <animate attributeName="opacity" from="0" to="1" dur="1.8s" fill="freeze"/>
    </text>
  </g>
</svg>
